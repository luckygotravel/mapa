<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LuckyGo Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

html,body{
margin:0;
padding:0;
height:100%;
width:100%;
font-family:Arial;
background:#fff;
}

#map{
height:100vh;
width:100%;
}

/* mapa minimalista */

.leaflet-control-container{
display:none;
}

.leaflet-popup-content-wrapper{
border-radius:16px;
box-shadow:0 8px 24px rgba(0,0,0,0.12);
}

.leaflet-popup-tip{
box-shadow:none;
}

.leaflet-popup-content{
margin:14px;
min-width:210px;
max-width:250px;
}

.popup-title{
font-size:15px;
font-weight:700;
color:#222;
margin-bottom:6px;
}

.popup-text{
font-size:13px;
line-height:1.4;
color:#555;
margin-bottom:10px;
}

.popup-actions{
display:flex;
gap:8px;
}

.popup-link{
display:inline-block;
padding:8px 12px;
border-radius:12px;
font-size:12.5px;
font-weight:700;
background:#111;
color:#fff;
text-decoration:none;
}

.popup-link.secondary{
background:#efefef;
color:#222;
}

</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* API nueva */

const API_BASE="https://script.google.com/macros/s/AKfycbxMvNBAGkKgZgQrpH1l4FDkpURgx7YaevAWKOnEGs381v0KmjCahdvWo-r5RfEaqxO_/exec";

/* parámetros URL */

function getParam(name){
const params=new URLSearchParams(window.location.search);
return(params.get(name)||"").trim();
}

function norm(v){
return String(v||"").trim().toUpperCase();
}

function toNumber(v,fallback=null){
const n=Number(v);
return Number.isFinite(n)?n:fallback;
}

function safe(v){
return String(v||"").trim();
}

function isSi(v){
return norm(v)==="SI";
}

/* idioma */

function getIdioma(){
return norm(getParam("idioma"))==="EN"?"EN":"ES";
}

/* fetch */

async function fetchSheet(name){

const res=await fetch(API_BASE+"?sheet="+name+"&v="+Date.now());

if(!res.ok){
throw new Error("error loading "+name);
}

return await res.json();

}

/* mapa */

const DEFAULT_CENTER=[14.5975,-90.5132];
const DEFAULT_ZOOM=13;

const map=L.map("map",{
zoomControl:false,
attributionControl:false
}).setView(DEFAULT_CENTER,DEFAULT_ZOOM);

L.tileLayer(
"https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png",
{
subdomains:"abcd",
maxZoom:20
}
).addTo(map);

const layer=L.layerGroup().addTo(map);

/* iconos */

function createIcon(row){

const icon=row.ICONO_URL||row.ICONO;

const size=Number(row.ICON_SIZE)||28;

if(!icon){

return L.divIcon({
html:`<div style="width:${size}px;height:${size}px;border-radius:50%;background:#111;"></div>`,
iconSize:[size,size],
iconAnchor:[size/2,size]
});

}

return L.icon({
iconUrl:icon,
iconSize:[size,size],
iconAnchor:[size/2,size]
});

}

/* idioma */

function getTitle(row,idioma){

if(idioma==="EN"){
return safe(row.NOMBRE_VISIBLE_EN||row.NOMBRE_EN||row.NOMBRE);
}

return safe(row.NOMBRE_VISIBLE_ES||row.NOMBRE_ES||row.NOMBRE);

}

function getDesc(row,idioma){

if(idioma==="EN"){
return safe(row.DESCRIPCION_CORTA_EN||row.DESCRIPCION_EN);
}

return safe(row.DESCRIPCION_CORTA_ES||row.DESCRIPCION);

}

/* popup */

function popup(row,idioma){

const title=getTitle(row,idioma);
const desc=getDesc(row,idioma);

const maps=row.LINK_GOOGLE_MAPS||row.LINK_MAPS;
const book=row.LINK_RESERVA;

const how=idioma==="EN"?"How to get there":"Cómo llegar";
const reserve=idioma==="EN"?"Book":"Reservar";

return `

<div>

${title?`<div class="popup-title">${title}</div>`:""}

${desc?`<div class="popup-text">${desc}</div>`:""}

<div class="popup-actions">

${maps?`<a class="popup-link" target="_blank" href="${maps}">${how}</a>`:""}

${book?`<a class="popup-link secondary" target="_blank" href="${book}">${reserve}</a>`:""}

</div>

</div>

`;

}

/* filtros */

function matchGuia(row,guia){

if(!guia)return true;

return norm(row.GUIA)===norm(guia);

}

function matchCliente(row,cliente){

if(!cliente)return true;

const id=norm(row.ID_CLIENTE);

return id===norm(cliente)||id==="GENERAL"||id==="ALL"||id==="";

}

function matchCategoria(row,categoria){

if(!categoria)return true;

return norm(row.CATEGORIA)===norm(categoria)||norm(row.SUB_CATEGORIA)===norm(categoria);

}

/* init */

async function init(){

const guia=getParam("guia");
const cliente=getParam("cliente");
const categoria=getParam("categoria");
const idioma=getIdioma();

const lugares=await fetchSheet("LUGARES");
const guias=await fetchSheet("GUIAS");

const lugaresActivos=lugares.filter(r=>isSi(r.ACTIVO));

const guiasActivas=guias.filter(r=>isSi(r.ACTIVO));

const guiaData=guiasActivas.find(g=>norm(g.GUIA)===norm(guia));

if(guiaData){

map.setView(
[
toNumber(guiaData.LAT_CENTRO,DEFAULT_CENTER[0]),
toNumber(guiaData.LNG_CENTRO,DEFAULT_CENTER[1])
],
toNumber(guiaData.ZOOM,DEFAULT_ZOOM)
);

}

const filtrados=lugaresActivos.filter(r=>

matchGuia(r,guia)&&
matchCliente(r,cliente)&&
matchCategoria(r,categoria)

);

const bounds=[];

filtrados.forEach(row=>{

const lat=toNumber(row.LAT);
const lng=toNumber(row.LNG);

if(lat===null||lng===null)return;

const marker=L.marker([lat,lng],{
icon:createIcon(row)
});

marker.bindPopup(popup(row,idioma));

marker.addTo(layer);

bounds.push([lat,lng]);

});

if(!guiaData&&bounds.length){
map.fitBounds(bounds,{padding:[30,30]});
}

}

init();

</script>

</body>
</html>
