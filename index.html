<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LuckyGo Travel Map</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    crossorigin=""
  />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      font-family: Arial, sans-serif;
      background: #fff;
    }

    #map {
      width: 100%;
      height: 100vh;
    }

    .leaflet-control-attribution {
      font-size: 10px;
    }

    .leaflet-popup-content-wrapper {
      border-radius: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
    }

    .leaflet-popup-content {
      margin: 14px 16px;
      min-width: 220px;
      max-width: 280px;
    }

    .popup-title {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 8px;
      color: #222;
    }

    .popup-text {
      font-size: 13px;
      line-height: 1.5;
      margin-bottom: 12px;
      color: #444;
    }

    .popup-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .popup-link {
      display: inline-block;
      padding: 9px 14px;
      border-radius: 12px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 700;
      background: #111;
      color: #fff;
      transition: opacity 0.2s ease;
    }

    .popup-link:hover {
      opacity: 0.9;
    }

    .popup-link.secondary {
      background: #efefef;
      color: #222;
    }
  </style>
</head>
<body>

  <div id="map"></div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    crossorigin=""
  ></script>

  <script>
    const API_BASE = "https://script.google.com/macros/s/AKfycbwMobJD5dDOTuTxVeyEi2hTzND02jzJRlop8GjMgn_IbjtUi-I7ri1SM7EmUXt3yBXB/exec";

    const DEFAULT_CENTER = [14.5975, -90.5132];
    const DEFAULT_ZOOM = 13;

    function getParam(name) {
      const params = new URLSearchParams(window.location.search);
      return (params.get(name) || "").trim();
    }

    function norm(value) {
      return String(value ?? "").trim().toUpperCase();
    }

    function isSi(value) {
      return norm(value) === "SI";
    }

    function safeText(value) {
      return String(value ?? "").trim();
    }

    function toNumber(value, fallback = null) {
      const n = Number(value);
      return Number.isFinite(n) ? n : fallback;
    }

    function escapeHtml(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    async function fetchSheet(sheetName) {
      const url = `${API_BASE}?sheet=${encodeURIComponent(sheetName)}`;
      const res = await fetch(url, { cache: "no-store" });

      if (!res.ok) {
        throw new Error(`Error al cargar ${sheetName}: ${res.status}`);
      }

      const data = await res.json();

      if (!Array.isArray(data)) {
        throw new Error(`La respuesta de ${sheetName} no es un array.`);
      }

      return data;
    }

    function getIdioma() {
      const idioma = norm(getParam("idioma"));
      return idioma === "EN" ? "EN" : "ES";
    }

    function getTitleByLanguage(row, idioma) {
      if (idioma === "EN") {
        return safeText(
          row.NOMBRE_VISIBLE_EN ||
          row.NOMBRE_EN ||
          row.TITULO_EN ||
          row.NOMBRE_LUGAR ||
          row.NOMBRE ||
          ""
        );
      }

      return safeText(
        row.NOMBRE_VISIBLE_ES ||
        row.NOMBRE_ES ||
        row.TITULO_ES ||
        row.NOMBRE_LUGAR ||
        row.NOMBRE ||
        ""
      );
    }

    function getDescriptionByLanguage(row, idioma) {
      if (idioma === "EN") {
        return safeText(
          row.DESCRIPCION_CORTA_EN ||
          row.DESCRIPCION_EN ||
          row.DESCRIPCION_INGLES ||
          row.DESCRIPTION_EN ||
          ""
        );
      }

      return safeText(
        row.DESCRIPCION_CORTA_ES ||
        row.DESCRIPCION_ES ||
        row.DESCRIPCION ||
        ""
      );
    }

    function matchGuia(row, guiaFiltro) {
      if (!guiaFiltro) return true;
      return norm(row.GUIA) === norm(guiaFiltro);
    }

    function matchCliente(row, clienteFiltro) {
      if (!clienteFiltro) return true;

      const cliente = norm(clienteFiltro);
      const idCliente = norm(row.ID_CLIENTE);

      return (
        idCliente === cliente ||
        idCliente === "GENERAL" ||
        idCliente === "TODOS" ||
        idCliente === "ALL" ||
        idCliente === ""
      );
    }

    function matchCategoria(row, categoriaFiltro) {
      if (!categoriaFiltro) return true;

      const categoria = norm(categoriaFiltro);

      return (
        norm(row.CATEGORIA) === categoria ||
        norm(row.SUB_CATEGORIA) === categoria
      );
    }

    function createIcon(row) {
      const iconUrl = safeText(row.ICONO_URL || row.ICONO);
      const size = toNumber(row.ICON_SIZE, 34) || 34;

      if (!iconUrl) {
        return L.divIcon({
          className: "custom-div-icon",
          html: `
            <div style="
              width:${size}px;
              height:${size}px;
              border-radius:50%;
              background:#111;
              border:2px solid #fff;
              box-shadow:0 2px 8px rgba(0,0,0,0.25);
            "></div>
          `,
          iconSize: [size, size],
          iconAnchor: [size / 2, size],
          popupAnchor: [0, -size + 8]
        });
      }

      return L.icon({
        iconUrl: iconUrl,
        iconSize: [size, size],
        iconAnchor: [size / 2, size],
        popupAnchor: [0, -size + 8]
      });
    }

    function buildPopup(row, idioma) {
      const title = escapeHtml(getTitleByLanguage(row, idioma));
      const desc = escapeHtml(getDescriptionByLanguage(row, idioma));

      const mapsLink = safeText(
        row.LINK_GOOGLE_MAPS ||
        row.LINK_MAPS ||
        row.UBICACION_URL ||
        ""
      );

      const reservaLink = safeText(
        row.LINK_RESERVA ||
        row.RESERVA_URL ||
        ""
      );

      const howToGoText = idioma === "EN" ? "How to get there" : "Cómo llegar";
      const reserveText = idioma === "EN" ? "Book" : "Reservar";

      return `
        <div>
          ${title ? `<div class="popup-title">${title}</div>` : ""}
          ${desc ? `<div class="popup-text">${desc}</div>` : ""}
          <div class="popup-actions">
            ${mapsLink ? `<a class="popup-link" href="${escapeHtml(mapsLink)}" target="_blank" rel="noopener noreferrer">${howToGoText}</a>` : ""}
            ${reservaLink ? `<a class="popup-link secondary" href="${escapeHtml(reservaLink)}" target="_blank" rel="noopener noreferrer">${reserveText}</a>` : ""}
          </div>
        </div>
      `;
    }

    const guia = getParam("guia");
    const cliente = getParam("cliente");
    const categoria = getParam("categoria");
    const idioma = getIdioma();

    const map = L.map("map", {
      zoomControl: false
    }).setView(DEFAULT_CENTER, DEFAULT_ZOOM);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 20,
      attribution: "&copy; OpenStreetMap"
    }).addTo(map);

    const markersLayer = L.layerGroup().addTo(map);

    async function initMap() {
      try {
        const [lugaresRaw, guiasRaw] = await Promise.all([
          fetchSheet("LUGARES"),
          fetchSheet("GUIAS")
        ]);

        const guias = guiasRaw.filter(row => isSi(row.ACTIVO));
        const lugares = lugaresRaw.filter(row => isSi(row.ACTIVO));

        const guiaData = guias.find(row => norm(row.GUIA) === norm(guia));

        if (guiaData) {
          const latCentro = toNumber(guiaData.LAT_CENTRO, DEFAULT_CENTER[0]);
          const lngCentro = toNumber(guiaData.LNG_CENTRO, DEFAULT_CENTER[1]);
          const zoom = toNumber(guiaData.ZOOM, DEFAULT_ZOOM);
          map.setView([latCentro, lngCentro], zoom);
        }

        const filtrados = lugares.filter(row => {
          return (
            matchGuia(row, guia) &&
            matchCliente(row, cliente) &&
            matchCategoria(row, categoria)
          );
        });

        markersLayer.clearLayers();

        const bounds = [];

        filtrados.forEach(row => {
          const lat = toNumber(row.LAT);
          const lng = toNumber(row.LNG);

          if (lat === null || lng === null) return;

          const marker = L.marker([lat, lng], {
            icon: createIcon(row)
          });

          marker.bindPopup(buildPopup(row, idioma));
          marker.addTo(markersLayer);

          bounds.push([lat, lng]);
        });

        if (!guiaData && bounds.length > 0) {
          map.fitBounds(bounds, { padding: [40, 40] });
        }

        console.log("Parámetros:", { guia, cliente, categoria, idioma });
        console.log("Lugares filtrados:", filtrados);
      } catch (error) {
        console.error("Error cargando mapa:", error);
      }
    }

    initMap();
  </script>
</body>
</html>
