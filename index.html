<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LuckyGo Travel Map</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    crossorigin=""
  />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: #ffffff;
      font-family: Arial, sans-serif;
    }

    #map {
      width: 100%;
      height: 100vh;
    }

    .leaflet-control-zoom,
    .leaflet-control-attribution {
      display: none !important;
    }

    .leaflet-popup-content-wrapper {
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
      border: 0;
    }

    .leaflet-popup-tip {
      box-shadow: none;
    }

    .leaflet-popup-content {
      margin: 14px 14px 12px;
      min-width: 210px;
      max-width: 250px;
    }

    .popup-title {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.2;
      color: #222;
      margin-bottom: 8px;
    }

    .popup-text {
      font-size: 12.5px;
      line-height: 1.45;
      color: #555;
      margin-bottom: 12px;
    }

    .popup-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .popup-link {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 12px;
      text-decoration: none;
      font-size: 12.5px;
      font-weight: 700;
      background: #111;
      color: #fff;
    }

    .popup-link.secondary {
      background: #f1f1f1;
      color: #222;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    crossorigin=""
  ></script>

  <script>
    const API_BASE = "https://script.google.com/macros/s/AKfycbwMobJD5dDOTuTxVeyEi2hTzND02jzJRlop8GjMgn_IbjtUi-I7ri1SM7EmUXt3yBXB/exec";
    const DEFAULT_CENTER = [14.5975, -90.5132];
    const DEFAULT_ZOOM = 13;

    function getParam(name) {
      const params = new URLSearchParams(window.location.search);
      return (params.get(name) || "").trim();
    }

    function norm(value) {
      return String(value ?? "").trim().toUpperCase();
    }

    function safeText(value) {
      return String(value ?? "").trim();
    }

    function toNumber(value, fallback = null) {
      const n = Number(value);
      return Number.isFinite(n) ? n : fallback;
    }

    function isSi(value) {
      return norm(value) === "SI";
    }

    function escapeHtml(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function normalizeKey(key) {
      return String(key ?? "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/\s+/g, "")
        .replace(/[^A-Za-z0-9_]/g, "")
        .toUpperCase()
        .trim();
    }

    function getField(row, ...candidates) {
      if (!row) return "";

      for (const name of candidates) {
        if (name in row && safeText(row[name])) return safeText(row[name]);
      }

      const map = {};
      Object.keys(row).forEach(k => {
        map[normalizeKey(k)] = row[k];
      });

      for (const name of candidates) {
        const normalized = normalizeKey(name);
        if (normalized in map && safeText(map[normalized])) {
          return safeText(map[normalized]);
        }
      }

      return "";
    }

    async function fetchSheet(sheetName) {
      const url = `${API_BASE}?sheet=${encodeURIComponent(sheetName)}&_=${Date.now()}`;
      const res = await fetch(url, { cache: "no-store" });

      if (!res.ok) {
        throw new Error(`Error al cargar ${sheetName}: ${res.status}`);
      }

      const data = await res.json();

      if (!Array.isArray(data)) {
        throw new Error(`La respuesta de ${sheetName} no es un array.`);
      }

      return data;
    }

    function getIdioma() {
      return norm(getParam("idioma")) === "EN" ? "EN" : "ES";
    }

    function getTitleByLanguage(row, idioma) {
      if (idioma === "EN") {
        return getField(
          row,
          "NOMBRE_VISIBLE_EN",
          "NOMBRE_EN",
          "TITULO_EN"
        );
      }

      return getField(
        row,
        "NOMBRE_VISIBLE_ES",
        "NOMBRE_ES",
        "TITULO_ES",
        "NOMBRE_LUGAR",
        "NOMBRE"
      );
    }

    function getDescriptionByLanguage(row, idioma) {
      if (idioma === "EN") {
        return getField(
          row,
          "DESCRIPCION_CORTA_EN",
          "DESCRIPCION_EN",
          "DESCRIPTION_EN",
          "DESCRIPCION_INGLES"
        );
      }

      return getField(
        row,
        "DESCRIPCION_CORTA_ES",
        "DESCRIPCION_ES",
        "DESCRIPCION"
      );
    }

    function matchGuia(row, guiaFiltro) {
      if (!guiaFiltro) return true;
      return norm(getField(row, "GUIA")) === norm(guiaFiltro);
    }

    function matchCliente(row, clienteFiltro) {
      if (!clienteFiltro) return true;

      const cliente = norm(clienteFiltro);
      const idCliente = norm(getField(row, "ID_CLIENTE"));

      return (
        idCliente === cliente ||
        idCliente === "GENERAL" ||
        idCliente === "TODOS" ||
        idCliente === "ALL" ||
        idCliente === ""
      );
    }

    function matchCategoria(row, categoriaFiltro) {
      if (!categoriaFiltro) return true;

      const categoria = norm(categoriaFiltro);

      return (
        norm(getField(row, "CATEGORIA")) === categoria ||
        norm(getField(row, "SUB_CATEGORIA")) === categoria
      );
    }

    function createIcon(row) {
      const iconUrl = getField(row, "ICONO_URL", "ICONO");
      const size = toNumber(getField(row, "ICON_SIZE"), 30) || 30;

      if (!iconUrl) {
        return L.divIcon({
          className: "custom-div-icon",
          html: `
            <div style="
              width:${size}px;
              height:${size}px;
              border-radius:50%;
              background:#111;
              border:2px solid #fff;
              box-shadow:0 2px 8px rgba(0,0,0,0.18);
            "></div>
          `,
          iconSize: [size, size],
          iconAnchor: [size / 2, size],
          popupAnchor: [0, -size + 8]
        });
      }

      return L.icon({
        iconUrl,
        iconSize: [size, size],
        iconAnchor: [size / 2, size],
        popupAnchor: [0, -size + 8]
      });
    }

    function buildPopup(row, idioma) {
      const title = escapeHtml(
        getTitleByLanguage(row, idioma) ||
        getField(row, "NOMBRE_LUGAR", "NOMBRE")
      );

      const desc = escapeHtml(getDescriptionByLanguage(row, idioma));

      const mapsLink = getField(
        row,
        "LINK_GOOGLE_MAPS",
        "LINK_MAPS",
        "UBICACION_URL"
      );

      const reservaLink = getField(
        row,
        "LINK_RESERVA",
        "RESERVA_URL"
      );

      const howToGoText = idioma === "EN" ? "How to get there" : "Cómo llegar";
      const reserveText = idioma === "EN" ? "Book" : "Reservar";

      return `
        <div>
          ${title ? `<div class="popup-title">${title}</div>` : ""}
          ${desc ? `<div class="popup-text">${desc}</div>` : ""}
          <div class="popup-actions">
            ${mapsLink ? `<a class="popup-link" href="${escapeHtml(mapsLink)}" target="_blank" rel="noopener noreferrer">${howToGoText}</a>` : ""}
            ${reservaLink ? `<a class="popup-link secondary" href="${escapeHtml(reservaLink)}" target="_blank" rel="noopener noreferrer">${reserveText}</a>` : ""}
          </div>
        </div>
      `;
    }

    const guia = getParam("guia");
    const cliente = getParam("cliente");
    const categoria = getParam("categoria");
    const idioma = getIdioma();

    const map = L.map("map", {
      zoomControl: false,
      preferCanvas: true
    }).setView(DEFAULT_CENTER, DEFAULT_ZOOM);

    L.tileLayer("https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png", {
      maxZoom: 20,
      subdomains: "abcd"
    }).addTo(map);

    const markersLayer = L.layerGroup().addTo(map);

    async function initMap() {
      try {
        const [lugaresRaw, guiasRaw] = await Promise.all([
          fetchSheet("LUGARES"),
          fetchSheet("GUIAS")
        ]);

        const guias = guiasRaw.filter(row => isSi(getField(row, "ACTIVO")));
        const lugares = lugaresRaw.filter(row => isSi(getField(row, "ACTIVO")));

        const guiaData = guias.find(row => norm(getField(row, "GUIA")) === norm(guia));

        if (guiaData) {
          const latCentro = toNumber(getField(guiaData, "LAT_CENTRO"), DEFAULT_CENTER[0]);
          const lngCentro = toNumber(getField(guiaData, "LNG_CENTRO"), DEFAULT_CENTER[1]);
          const zoom = toNumber(getField(guiaData, "ZOOM"), DEFAULT_ZOOM);
          map.setView([latCentro, lngCentro], zoom);
        }

        const filtrados = lugares.filter(row => {
          return (
            matchGuia(row, guia) &&
            matchCliente(row, cliente) &&
            matchCategoria(row, categoria)
          );
        });

        markersLayer.clearLayers();

        const bounds = [];

        filtrados.forEach(row => {
          const lat = toNumber(getField(row, "LAT"));
          const lng = toNumber(getField(row, "LNG"));

          if (lat === null || lng === null) return;

          const marker = L.marker([lat, lng], {
            icon: createIcon(row)
          });

          marker.bindPopup(buildPopup(row, idioma), {
            closeButton: true,
            autoPan: true
          });

          marker.addTo(markersLayer);
          bounds.push([lat, lng]);
        });

        if (!guiaData && bounds.length > 0) {
          map.fitBounds(bounds, { padding: [35, 35] });
        }

        console.log("Idioma:", idioma);
        console.log("Ejemplo fila:", filtrados[0]);
        console.log("Desc EN ejemplo:", filtrados[0] ? getDescriptionByLanguage(filtrados[0], "EN") : "");
      } catch (error) {
        console.error("Error cargando mapa:", error);
      }
    }

    initMap();
  </script>
</body>
</html>
